# CI pipeline: vet, test, lint, and build verification for scrim.
name: CI

run-name: "CI ${{ github.event.pull_request.title || github.ref_name }}"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Vet
        run: go vet ./...

      - name: Run tests
        # -coverpkg=./internal/... instruments every internal package across all
        # test binaries, so the reported total reflects cross-package coverage
        # (e.g. a cli test that exercises server code) honestly, not just each
        # package's coverage of its own in-package tests.
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic -coverpkg=./internal/... ./...

      - name: Check coverage
        run: |
          coverage=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Coverage: ${coverage}%"
          echo "## Test Coverage: ${coverage}%" >> $GITHUB_STEP_SUMMARY

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.10.1

      - name: Check go mod tidy
        run: go mod tidy && git diff --exit-code -- go.mod go.sum

  spec-lint:
    name: OpenAPI spec lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      # vacuum is a single Go binary, matching the repo's no-extra-toolchain
      # posture; pinned to a fixed version like golangci-lint above.
      # GOTOOLCHAIN=auto is scoped to just this step: vacuum's module requires a
      # newer Go patch than go.mod pins, so `go install` must be allowed to
      # fetch the toolchain vacuum names (deterministic — fixed by the version
      # pin above). The build/test jobs keep the runner's default GOTOOLCHAIN.
      - name: Install vacuum
        env:
          GOTOOLCHAIN: auto
        run: go install github.com/daveshanley/vacuum@v0.29.9

      # Fails on any error-severity finding (vacuum's default fail behavior),
      # so a spec that drifts from a valid OpenAPI 3.1 document blocks the PR.
      - name: Lint api/openapi.yaml
        run: vacuum lint --details --fail-severity error api/openapi.yaml

  govulncheck:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      # govulncheck is a single Go binary, matching the repo's no-extra-toolchain
      # posture (same as the vacuum step above); pinned to a fixed version.
      # GOTOOLCHAIN=auto is scoped to this step so `go install` may fetch the
      # toolchain govulncheck names if it needs a newer Go patch than go.mod pins
      # (deterministic — fixed by the version pin). Reports only vulnerabilities
      # in code paths actually reachable from this module, so it fails the PR on
      # a real exploitable CVE, not merely a vulnerable-but-unused dependency.
      - name: Install govulncheck
        env:
          GOTOOLCHAIN: auto
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.6.0

      - name: Scan for known vulnerabilities
        run: govulncheck ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Build binary
        run: make build

      - name: Verify binary
        run: |
          ./scrim --version
          echo "## Build" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ./scrim --version >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  ci:
    name: CI
    if: always()
    needs: [test, lint, spec-lint, govulncheck, build]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          results=("${{ needs.test.result }}" "${{ needs.lint.result }}" "${{ needs.spec-lint.result }}" "${{ needs.govulncheck.result }}" "${{ needs.build.result }}")
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "CI failed"
              exit 1
            fi
          done
          echo "All checks passed"
